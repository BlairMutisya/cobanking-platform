    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: ${LEDGER_DB_PASSWORD:?Set LEDGER_DB_PASSWORD in .env}
    ports:
      - "5437:5432"

  audit-db:
    image: postgres:16-alpine
    container_name: cobanking-audit-db
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: ${AUDIT_DB_PASSWORD:?Set AUDIT_DB_PASSWORD in .env}
    ports:
      - "5438:5432"

  esb-db:
    image: postgres:16-alpine
    container_name: cobanking-esb-db
    environment:
      POSTGRES_DB: esb_db
      POSTGRES_USER: esb_user
      POSTGRES_PASSWORD: ${ESB_DB_PASSWORD:?Set ESB_DB_PASSWORD in .env}
    ports:
      - "5439:5432"
