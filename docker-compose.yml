services:
  auth-db:
    image: postgres:16-alpine
    container_name: cobanking-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?Set AUTH_DB_PASSWORD in .env}
    ports:
      - "5433:5432"

  customer-db:
    image: postgres:16-alpine
    container_name: cobanking-customer-db
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: ${CUSTOMER_DB_PASSWORD:?Set CUSTOMER_DB_PASSWORD in .env}
    ports:
      - "5434:5432"

  account-db:
    image: postgres:16-alpine
    container_name: cobanking-account-db
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: ${ACCOUNT_DB_PASSWORD:?Set ACCOUNT_DB_PASSWORD in .env}
    ports:
      - "5435:5432"

  transaction-db:
