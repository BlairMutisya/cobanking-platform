server:
  port: 8084

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5434/customer_db
    username: customer_user
    password: ${CUSTOMER_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
