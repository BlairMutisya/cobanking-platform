server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: customer-service
          uri: http://localhost:8084
          predicates:
            - Path=/customers/**
        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/accounts/**
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/transactions/**
        - id: ledger-service
          uri: http://localhost:8086
          predicates:
            - Path=/ledger/**
        - id: audit-service
          uri: http://localhost:8085
          predicates:
            - Path=/audit/**
        - id: esb
          uri: http://localhost:8090
          predicates:
            - Path=/esb/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
