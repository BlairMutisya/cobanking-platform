server:
  port: 8086

spring:
  application:
    name: ledger-service
  datasource:
    url: jdbc:postgresql://localhost:5437/ledger_db
    username: ledger_user
    password: ${LEDGER_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
